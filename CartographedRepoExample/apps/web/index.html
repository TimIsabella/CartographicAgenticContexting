<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Example Repo Auth + Billing Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: Canvas;
        color: CanvasText;
      }

      main {
        width: min(900px, calc(100% - 32px));
        margin: 48px auto;
        display: grid;
        gap: 24px;
      }

      section {
        border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        border-radius: 16px;
        padding: 20px;
      }

      form,
      .plan-grid {
        display: grid;
        gap: 12px;
      }

      form {
        max-width: 420px;
      }

      input,
      textarea,
      button,
      select {
        font: inherit;
        border-radius: 10px;
        border: 1px solid color-mix(in srgb, CanvasText 22%, transparent);
        padding: 10px 12px;
      }

      textarea {
        min-height: 90px;
        resize: vertical;
      }

      button {
        cursor: pointer;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      .status {
        font-weight: 650;
      }

      .error {
        color: #b00020;
      }

      .note-list,
      .invoice-list {
        display: grid;
        gap: 12px;
        padding: 0;
        list-style: none;
      }

      .note-list li,
      .invoice-list li,
      .plan-card {
        border: 1px solid color-mix(in srgb, CanvasText 14%, transparent);
        border-radius: 12px;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Auth + Billing Demo</h1>
        <p>
          A tiny website that registers users, logs them in with an HTTP-only
          cookie, stores private notes, and demonstrates subscription state in a
          local JSON database.
        </p>
      </header>

      <section aria-labelledby="auth-title">
        <h2 id="auth-title">Account</h2>
        <p id="status" class="status">Checking session...</p>

        <form id="auth-form">
          <label>
            Username
            <input id="username" name="username" autocomplete="username" required minlength="3" />
          </label>
          <label>
            Password
            <input id="password" name="password" type="password" autocomplete="current-password" required minlength="8" />
          </label>
          <div class="row">
            <button type="submit" data-action="login">Log in</button>
            <button type="submit" data-action="register">Register</button>
            <button type="button" id="logout-button">Log out</button>
          </div>
        </form>
      </section>

      <section aria-labelledby="notes-title">
        <h2 id="notes-title">Private Notes</h2>
        <form id="note-form">
          <label>
            New note
            <textarea id="note-text" name="note" required></textarea>
          </label>
          <button type="submit">Save note</button>
        </form>
        <ul id="notes" class="note-list"></ul>
      </section>

      <section aria-labelledby="billing-title">
        <h2 id="billing-title">Billing</h2>
        <p id="billing-status">Log in to manage a subscription.</p>
        <div id="plans" class="plan-grid"></div>
        <form id="billing-form">
          <label>
            Plan
            <select id="plan-select" name="plan"></select>
          </label>
          <button type="submit">Subscribe</button>
        </form>
        <h3>Invoices</h3>
        <ul id="invoices" class="invoice-list"></ul>
      </section>
    </main>

    <script src="./src/app.js" type="module"></script>
  </body>
</html>
