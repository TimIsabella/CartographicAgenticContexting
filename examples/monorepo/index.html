<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cartographic Agentic Contexting Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      body {
        margin: 0;
        background: Canvas;
        color: CanvasText;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      header {
        margin-bottom: 32px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1;
      }

      p {
        max-width: 72ch;
      }

      form,
      section {
        border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        border-radius: 18px;
        padding: 20px;
        margin: 20px 0;
        background: color-mix(in srgb, Canvas 92%, CanvasText 8%);
      }

      label {
        display: block;
        font-weight: 700;
        margin: 0 0 8px;
      }

      input,
      textarea,
      button {
        box-sizing: border-box;
        width: 100%;
        border-radius: 12px;
        border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
        padding: 12px 14px;
        font: inherit;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      button {
        margin-top: 16px;
        cursor: pointer;
        font-weight: 700;
      }

      .field {
        margin-bottom: 16px;
      }

      .cards {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .card {
        border: 1px solid color-mix(in srgb, CanvasText 14%, transparent);
        border-radius: 14px;
        padding: 14px;
        background: Canvas;
      }

      .card h3 {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      ol {
        padding-left: 24px;
      }

      li + li {
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Context Resolver Demo</h1>
        <p>
          This small browser-only example turns the scaffolded monorepo context files into a runnable demonstration.
          Enter a repository path and task, then resolve the smallest sufficient context set for that operating context.
        </p>
      </header>

      <form id="resolver-form">
        <div class="field">
          <label for="path">Repository path</label>
          <input id="path" name="path" value="apps/api/src/auth/login.js" autocomplete="off" />
        </div>

        <div class="field">
          <label for="task">Task</label>
          <textarea id="task" name="task">Change login session behavior and check whether persisted session data needs release notes.</textarea>
        </div>

        <button type="submit">Resolve context</button>
      </form>

      <section aria-live="polite">
        <h2>Resolved context</h2>
        <div id="result"></div>
      </section>

      <section>
        <h2>Try these operating contexts</h2>
        <div class="cards" id="examples"></div>
      </section>
    </main>

    <script type="module" src="./context-resolver.js"></script>
  </body>
</html>
